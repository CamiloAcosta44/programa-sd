spring.application.name=API REST Distribuidos

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:sddb}
spring.datasource.username=${DB_USER:sduser}
spring.datasource.password=${DB_PASS:sdpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP (connection pool) ─────────────────────────────────────────────
# Con 3 réplicas y una sola instancia de PostgreSQL, no conviene abrir
# demasiadas conexiones. 10 por réplica = 30 conexiones simultáneas totales,
# que es un valor seguro para Postgres por defecto (max_connections=100).
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Evita que Hibernate cuente el total de filas en queries que no lo necesitan
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=false

# Identificador de réplica
program.id=${HOSTNAME:local}
